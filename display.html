<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseRoom — Display</title>
<style>
:root{--bg:#02477B;--card:#013460;--dark:#011e3d;--blue:#028BF2;--bl:#3aa8ff;--pale:rgba(2,139,242,0.12);--bord:rgba(2,139,242,0.25);--w:#fff;--gr:#7aa5c8;--green:#0f9e5e;--gbg:rgba(15,158,94,0.15);--gbd:rgba(15,158,94,0.5);--red:#e03434;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--w);height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative;}
body::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(2,139,242,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(2,139,242,0.05) 1px,transparent 1px);background-size:80px 80px;pointer-events:none;}
body::after{content:'';position:absolute;width:900px;height:900px;border-radius:50%;background:radial-gradient(circle,rgba(2,139,242,0.12) 0%,transparent 65%);top:-300px;right:-300px;pointer-events:none;}
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 48px;border-bottom:1px solid var(--bord);background:rgba(1,30,61,0.6);position:relative;z-index:10;flex-shrink:0;}
.header-logo{height:32px;width:auto;}
.header-center{font-family:'Georgia',serif;font-size:16px;font-weight:600;color:var(--gr);letter-spacing:.06em;text-align:center;}
.header-right{display:flex;align-items:center;gap:24px;}
.live-pill{display:flex;align-items:center;gap:8px;background:rgba(15,158,94,.15);border:1px solid rgba(15,158,94,.4);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:700;color:#3ddfa0;}
.live-dot{width:8px;height:8px;border-radius:50%;background:#3ddfa0;animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:.3;}50%{opacity:1;}}
.participants-pill{display:flex;align-items:center;gap:8px;background:var(--pale);border:1px solid var(--bord);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:700;color:var(--bl);}
.progress-wrap{height:4px;background:rgba(255,255,255,.06);flex-shrink:0;position:relative;z-index:10;}
.progress-fill{height:4px;background:linear-gradient(90deg,var(--blue),var(--bl));transition:width .8s ease;width:0%;}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 80px;position:relative;z-index:5;overflow:hidden;}
.idle-screen{display:flex;flex-direction:column;align-items:center;text-align:center;}
.idle-title{font-family:'Georgia',serif;font-size:clamp(40px,6vw,72px);font-weight:700;line-height:1.1;margin-bottom:16px;}
.idle-title span{color:var(--bl);}
.idle-sub{font-size:18px;color:var(--gr);margin-bottom:48px;}
.qr-box{background:white;border-radius:12px;padding:20px;display:inline-block;margin-bottom:16px;}
.qr-box canvas{display:block;}
.scan-hint{font-size:14px;color:var(--gr);letter-spacing:.06em;text-transform:uppercase;}
.question-screen{display:none;width:100%;max-width:1100px;}
.q-meta-row{display:flex;align-items:center;gap:16px;margin-bottom:28px;}
.q-badge{background:var(--pale);border:1px solid var(--bord);border-radius:4px;padding:6px 18px;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--bl);white-space:nowrap;flex-shrink:0;}
.q-divider{flex:1;height:1px;background:var(--bord);}
.q-counter{font-size:13px;color:var(--gr);white-space:nowrap;}
.question-text{font-family:'Georgia',serif;font-size:clamp(24px,3.5vw,44px);font-weight:700;line-height:1.25;margin-bottom:40px;text-align:center;}
.bars-grid{display:flex;flex-direction:column;gap:14px;width:100%;}
.bar-row{display:flex;align-items:center;gap:16px;}
.bar-letter{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;transition:all .3s;}
.bar-letter.correct{background:var(--green);border-color:var(--green);}
.bar-label{font-size:clamp(14px,1.8vw,20px);width:220px;flex-shrink:0;line-height:1.3;transition:color .3s;}
.bar-label.correct{color:#3ddfa0;font-weight:600;}
.bar-track{flex:1;height:48px;background:rgba(255,255,255,.06);border-radius:8px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:8px;background:var(--blue);width:0%;transition:width 1s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:flex-end;padding-right:12px;}
.bar-fill.correct{background:var(--green);}
.bar-pct{font-size:16px;font-weight:700;color:rgba(255,255,255,.9);white-space:nowrap;opacity:0;transition:opacity .3s .5s;}
.bar-pct.visible{opacity:1;}
.bar-count{font-size:13px;color:var(--gr);width:80px;text-align:right;flex-shrink:0;}
.source-bar{position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:13px;color:rgba(255,255,255,.25);letter-spacing:.06em;z-index:10;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.animated{animation:fadeUp .5s ease forwards;}
.done-screen{display:none;text-align:center;flex-direction:column;align-items:center;}
.done-title{font-family:'Georgia',serif;font-size:clamp(36px,5vw,64px);font-weight:700;margin-bottom:16px;}
.done-sub{font-size:18px;color:var(--gr);margin-bottom:40px;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

  <div class="header-center" id="eventName">Fountainhead PulseRoom</div>
  <div class="header-right">
    <div class="live-pill" id="livePill" style="display:none;"><div class="live-dot"></div> LIVE</div>
    <div class="participants-pill">👥 <span id="participantCount">0</span> Teilnehmer</div>

<div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
<div class="main" id="mainArea">
  <div class="idle-screen" id="idleScreen">
    <div class="idle-title" id="displayTitle">Audience<br><span id="displaySubtitle">Engagement</span></div>
    <div class="idle-sub">Scan den QR-Code um teilzunehmen</div>
    <div class="qr-box" id="qrDisplay"></div>
    <div class="scan-hint">↑ Handy-Kamera auf den Code richten</div>
  </div>
  <div class="question-screen" id="questionScreen">
    <div class="q-meta-row">
      <div class="q-badge" id="qBadge">Frage 1</div>
      <div class="q-divider"></div>
      <div class="q-counter" id="qCounter">1 / 5</div>
    </div>
    <div class="question-text" id="questionText"></div>
    <div class="bars-grid" id="barsGrid"></div>
  </div>
  <div class="done-screen" id="doneScreen">
    <div class="done-title">Danke fürs Mitmachen! 🎉</div>
    <div style="width:60px;height:2px;background:var(--blue);margin:0 auto 32px;border-radius:1px;"></div>
    <div class="done-sub">Quiz beendet · Ergebnisse wurden gespeichert</div>
  </div>
</div>
<div class="source-bar" id="sourceBar"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {apiKey:"AIzaSyD4bV78hMgY3HSVY1naBSdg8eIdNG3gvy0",authDomain:"fountainhead-pulseroom.firebaseapp.com",databaseURL:"https://fountainhead-pulseroom-default-rtdb.europe-west1.firebasedatabase.app",projectId:"fountainhead-pulseroom",storageBucket:"fountainhead-pulseroom.firebasestorage.app",messagingSenderId:"846519896869",appId:"1:846519896869:web:bd426feeaba5b2ce2f28cc"};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const LETTERS = ['A','B','C','D','E','F'];
const eventId = new URLSearchParams(window.location.search).get('event') || 'default';
const participantURL = window.location.href.replace('display.html','participant.html') + '?event=' + eventId;

// Generate QR code
new QRCode(document.getElementById('qrDisplay'), {
  text: participantURL,
  width: 200, height: 200,
  colorDark: '#02477B',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.M
});

let currentQId = null;

onValue(ref(db, 'events/' + eventId), (snapshot) => {
  const data = snapshot.val();
  if(!data) return;

  if(data.name) document.getElementById('eventName').textContent = data.name;
  if(data.displayTitle) {
    const el = document.getElementById('displayTitle');
    const sub = document.getElementById('displaySubtitle');
    el.childNodes[0].textContent = data.displayTitle;
    if(sub && data.displaySubtitle) sub.textContent = data.displaySubtitle;
  }

  // Participant count
  const pCount = data.participants ? Object.keys(data.participants).length : 0;
  document.getElementById('participantCount').textContent = pCount;

  if(data.ended) {
    document.getElementById('idleScreen').style.display = 'none';
    document.getElementById('questionScreen').style.display = 'none';
    document.getElementById('doneScreen').style.display = 'flex';
    document.getElementById('livePill').style.display = 'none';
    return;
  }

  if(!data.questions) return;

  const qs = Object.values(data.questions).sort((a,b) => (a.order||0) - (b.order||0));
  const total = qs.length;
  const active = qs.find(q => q.active);

  if(!active) {
    document.getElementById('idleScreen').style.display = 'flex';
    document.getElementById('questionScreen').style.display = 'none';
    document.getElementById('livePill').style.display = 'none';
    document.getElementById('progressFill').style.width = '0%';
    return;
  }

  document.getElementById('idleScreen').style.display = 'none';
  document.getElementById('questionScreen').style.display = 'block';
  document.getElementById('livePill').style.display = 'flex';

  const idx = qs.indexOf(active);
  document.getElementById('qBadge').textContent = 'Frage ' + (idx+1);
  document.getElementById('qCounter').textContent = (idx+1) + ' / ' + total;
  document.getElementById('questionText').textContent = active.text;
  document.getElementById('sourceBar').textContent = active.source ? 'Quelle: ' + active.source : '';
  document.getElementById('progressFill').style.width = ((idx+1)/(total+1)*100) + '%';

  const grid = document.getElementById('barsGrid');
  if(grid.dataset.qid !== active.id) {
    grid.dataset.qid = active.id;
    grid.innerHTML = active.options.map((opt,i) => `
      <div class="bar-row animated" style="animation-delay:${i*0.06}s">
        <div class="bar-letter" id="dl-${i}">${LETTERS[i]}</div>
        <div class="bar-label" id="dlabel-${i}">${opt}</div>
        <div class="bar-track">
          <div class="bar-fill" id="dfill-${i}">
            <span class="bar-pct" id="dpct-${i}"></span>
          </div>
        </div>
        <div class="bar-count" id="dcount-${i}"></div>
      </div>
    `).join('');
  }

  if(active.revealed) {
    const votes = active.votes || {};
    const vTotal = Math.max(Object.values(votes).reduce((a,b)=>a+b,0), 1);
    active.options.forEach((_,i) => {
      const p = Math.round((votes[i]||0)/vTotal*100);
      const fill = document.getElementById('dfill-'+i);
      const pct = document.getElementById('dpct-'+i);
      const letter = document.getElementById('dl-'+i);
      const label = document.getElementById('dlabel-'+i);
      const count = document.getElementById('dcount-'+i);
      const isCorrect = (active.correct||[]).includes(i);
      if(fill) { fill.style.width=p+'%'; if(isCorrect) fill.classList.add('correct'); }
      if(pct) { pct.textContent=p+'%'; setTimeout(()=>pct.classList.add('visible'),600); }
      if(letter && isCorrect) letter.classList.add('correct');
      if(label && isCorrect) label.classList.add('correct');
      if(count) count.textContent=(votes[i]||0)+' Stimmen';
    });
  } else {
    active.options.forEach((_,i) => {
      const fill = document.getElementById('dfill-'+i);
      const pct = document.getElementById('dpct-'+i);
      if(fill) { fill.style.width='0%'; fill.className='bar-fill'; }
      if(pct) { pct.textContent=''; pct.classList.remove('visible'); }
      const letter = document.getElementById('dl-'+i);
      const label = document.getElementById('dlabel-'+i);
      if(letter) letter.className='bar-letter';
      if(label) label.className='bar-label';
      const count = document.getElementById('dcount-'+i);
      if(count) count.textContent='';
    });
  }
});
</script>
